spring.application.name=cloudsimplus-k8s

# REST/SSE API for the React UI. Tomcat boots on this port; the CLI runner
# still reacts to --example / --list and exits when given one.
server.port=8080

# Allowed browser origin(s) for the standalone Vite frontend (comma-separated).
cspsim.cors.allowed-origins=http://localhost:5173

# SSE streams are long-lived; do not let async requests time out mid-run.
spring.mvc.async.request-timeout=-1

# Logging is configured in logback.xml (it must override the logback.xml bundled
# in the cloudsimplus dependency jar, so it cannot be driven from here).
