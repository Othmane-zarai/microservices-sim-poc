apiVersion: v1
kind: ConfigMap
metadata:
  name: locustfile
data:
  locustfile.py: |
    from locust import HttpUser, task, between, SequentialTaskSet

    class BrowseAndOrder(SequentialTaskSet):
        @task
        def list_products(self):
            self.client.get("/", name="GET /")
        @task
        def view_product(self):
            self.client.get("/?product=42", name="GET /product")
        @task
        def add_to_cart(self):
            self.client.post("/cart", data="productId=42", name="POST /cart")
        @task
        def checkout(self):
            self.client.post("/checkout", data="confirm=1", name="POST /checkout")

    class WebUser(HttpUser):
        tasks = [BrowseAndOrder]
        wait_time = between(0.1, 1)
---
apiVersion: batch/v1
kind: Job
metadata:
  name: locust-driver
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: locust
          image: locustio/locust:2.31.5
          command: ["/bin/sh", "-c"]
          args:
            - |
              locust -f /mnt/locust/locustfile.py \
                --host=http://web.default.svc.cluster.local \
                --headless \
                --users=1000 \
                --spawn-rate=20 \
                --run-time=10m \
                --csv=/tmp/locust ;
              echo "=== Locust finished, sleeping so kubectl cp can extract results ===" ;
              sleep 3600
          volumeMounts:
            - name: locustfile
              mountPath: /mnt/locust
      volumes:
        - name: locustfile
          configMap:
            name: locustfile
