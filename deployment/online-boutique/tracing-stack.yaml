# Tracing backend for the Online Boutique end-to-end validation.
#
# Components:
#   - Jaeger all-in-one (memory backend) for trace storage + UI.
#   - OpenTelemetry Collector that receives OTLP from the boutique
#     services and forwards to Jaeger (gRPC :14250).
#
# Both images are multi-arch (amd64/arm64) so they run unmodified on the
# OCI Ampere k3s cluster.
---
apiVersion: v1
kind: Namespace
metadata:
  name: observability
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: observability
  labels: { app: jaeger }
spec:
  replicas: 1
  selector: { matchLabels: { app: jaeger } }
  template:
    metadata:
      labels: { app: jaeger }
    spec:
      containers:
      - name: jaeger
        image: jaegertracing/all-in-one:1.57
        env:
        - { name: COLLECTOR_OTLP_ENABLED, value: "true" }
        - { name: SPAN_STORAGE_TYPE, value: "memory" }
        ports:
        - { name: ui,          containerPort: 16686 }
        - { name: otlp-grpc,   containerPort: 4317 }
        - { name: otlp-http,   containerPort: 4318 }
        - { name: jaeger-grpc, containerPort: 14250 }
        resources:
          requests: { cpu: 100m, memory: 256Mi }
          limits:   { cpu: 500m, memory: 1Gi }
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: observability
spec:
  selector: { app: jaeger }
  ports:
  - { name: ui,          port: 16686, targetPort: 16686 }
  - { name: otlp-grpc,   port: 4317,  targetPort: 4317 }
  - { name: otlp-http,   port: 4318,  targetPort: 4318 }
  - { name: jaeger-grpc, port: 14250, targetPort: 14250 }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: observability
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc: { endpoint: 0.0.0.0:4317 }
          http: { endpoint: 0.0.0.0:4318 }
    processors:
      batch: {}
    exporters:
      otlp:
        endpoint: jaeger:4317
        tls: { insecure: true }
      debug:
        verbosity: basic
    service:
      pipelines:
        traces:
          receivers:  [otlp]
          processors: [batch]
          exporters:  [otlp, debug]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: observability
  labels: { app: otel-collector }
spec:
  replicas: 1
  selector: { matchLabels: { app: otel-collector } }
  template:
    metadata:
      labels: { app: otel-collector }
    spec:
      containers:
      - name: otel-collector
        image: otel/opentelemetry-collector-contrib:0.103.0
        args: ["--config=/etc/otel/config.yaml"]
        volumeMounts:
        - { name: cfg, mountPath: /etc/otel }
        ports:
        - { name: otlp-grpc, containerPort: 4317 }
        - { name: otlp-http, containerPort: 4318 }
        resources:
          requests: { cpu: 100m, memory: 128Mi }
          limits:   { cpu: 500m, memory: 512Mi }
      volumes:
      - name: cfg
        configMap: { name: otel-collector-config }
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: observability
spec:
  selector: { app: otel-collector }
  ports:
  - { name: otlp-grpc, port: 4317, targetPort: 4317 }
  - { name: otlp-http, port: 4318, targetPort: 4318 }
