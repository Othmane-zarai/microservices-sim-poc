apiVersion: v1
kind: ConfigMap
metadata:
  name: web-server-script
data:
  server.py: |
    from http.server import ThreadingHTTPServer, BaseHTTPRequestHandler
    import os

    # CPU burn per request — fibonacci(N) without memoisation keeps the CPU busy
    # for ~8-15 ms; ThreadingHTTPServer handles concurrent requests so 150+ req/s
    # per pod drives CPU well above the 50% HPA trigger.
    BURN = int(os.environ.get("BURN_N", "28000"))

    def _fib(n):
        a, b = 0, 1
        for _ in range(n):
            a, b = b, a + b
        return a

    class Handler(BaseHTTPRequestHandler):
        def _respond(self):
            _fib(BURN)
            self.send_response(200)
            self.send_header("Content-Type", "text/plain")
            self.end_headers()
            self.wfile.write(b"ok\n")

        def do_GET(self):
            self._respond()

        def do_POST(self):
            n = int(self.headers.get("Content-Length", 0))
            self.rfile.read(n)
            self._respond()

        def log_message(self, *_):
            pass

    if __name__ == "__main__":
        ThreadingHTTPServer(("", 80), Handler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  labels:
    app: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: python:3.12-slim
          command: ["python3", "/app/server.py"]
          env:
            - name: BURN_N
              value: "10000"
          resources:
            requests:
              cpu: 200m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          ports:
            - containerPort: 80
          volumeMounts:
            - name: script
              mountPath: /app
      volumes:
        - name: script
          configMap:
            name: web-server-script
---
apiVersion: v1
kind: Service
metadata:
  name: web
spec:
  type: LoadBalancer
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 80
