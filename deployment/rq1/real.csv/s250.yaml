# scenario_seed: 1403792057
apiVersion: v1
kind: Pod
metadata:
  name: rq1-s250
  labels:
    rq1-scenario: "s250"
spec:
  containers:
    - name: pause
      image: registry.k8s.io/pause:3.9
      resources:
        requests: {cpu: 50m, memory: 32Mi}
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
            - key: role
              operator: In
              values: ["gpu"]
  tolerations:
    - key: dedicated
      operator: Equal
      value: gpu
      effect: NoSchedule
