apiVersion: v1
kind: Pod
metadata:
  name: rq1-s169
  labels:
    rq1-scenario: "s169"
spec:
  containers:
    - name: pause
      image: registry.k8s.io/pause:3.9
      resources:
        requests: {cpu: 50m, memory: 32Mi}
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
            - key: zone
              operator: In
              values: ["c"]
