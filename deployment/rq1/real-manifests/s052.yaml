# scenario_seed: 2272528809
apiVersion: v1
kind: Pod
metadata:
  name: rq1-s052
  labels:
    rq1-scenario: "s052"
spec:
  containers:
    - name: pause
      image: registry.k8s.io/pause:3.9
      resources:
        requests: {cpu: 50m, memory: 32Mi}
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
            - key: rack
              operator: In
              values: ["r3"]
  tolerations:
    - key: dedicated
      operator: Equal
      value: gpu
      effect: NoSchedule
